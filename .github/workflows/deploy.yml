name: Deploy to incendieplan.fr

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.atkj3335.odns.fr
          username: atkj3335@incendieplan.fr
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/
          server-dir: incendieplan.fr/
          dangerous-clean-slate: true
