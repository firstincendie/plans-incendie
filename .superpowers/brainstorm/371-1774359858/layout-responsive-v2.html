<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Responsive — Détail commande</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #F3F4F6; padding: 24px; }

  .list-header { font-size: 22px; font-weight: 700; color: #122131; margin-bottom: 16px; }
  .list-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .list-cols { display: grid; grid-template-columns: 2fr 1fr 0.6fr 1fr 1.4fr; padding: 10px 20px; border-bottom: 1px solid #E5E7EB; font-size: 11px; color: #9CA3AF; font-weight: 700; text-transform: uppercase; }
  .list-row { display: grid; grid-template-columns: 2fr 1fr 0.6fr 1fr 1.4fr; padding: 14px 20px; border-bottom: 1px solid #F3F4F6; align-items: center; cursor: pointer; transition: background .1s; }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: #FFF3EE; }

  .header-btn { height: 36px; padding: 0 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; border: 1px solid #D1D5DB; background: #F9FAFB; color: #374151; white-space: nowrap; }
  .header-btn.badge-attente { background: #FEF3C7; color: #78350F; border-color: #FDE68A; pointer-events: none; }

  .dropdown { position: relative; }
  .dropdown-menu { display: none; position: absolute; right: 0; top: 42px; background: #fff; border: 1px solid #D1D5DB; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.15); z-index: 1000; min-width: 190px; overflow: hidden; }
  .dropdown-menu.open { display: block; }
  .dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; color: #374151; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-weight: 500; }
  .dropdown-item:hover { background: #F3F4F6; }
  .dropdown-item.danger { color: #DC2626; }
  .dropdown-item.danger:hover { background: #FEF2F2; }
  .dropdown-divider { height: 1px; background: #E5E7EB; margin: 4px 0; }

  .section-title { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #E5E7EB; }

  .accordion-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; border: 1px solid #D1D5DB; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
  .accordion-body { display: none; flex-direction: column; gap: 6px; padding: 10px; border: 1px solid #D1D5DB; border-top: none; border-radius: 0 0 8px 8px; }

  table { width: 100%; border-collapse: collapse; border: 1px solid #D1D5DB; border-radius: 8px; overflow: hidden; font-size: 13px; }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #374151; background: #E5E7EB; border-bottom: 2px solid #D1D5DB; border-right: 1px solid #D1D5DB; }
  th:last-child { border-right: none; }
  td { padding: 9px 12px; color: #111827; border-bottom: 1px solid #E5E7EB; border-right: 1px solid #E5E7EB; }
  td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #F9FAFB; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; width: 90%; height: 90vh; border-radius: 14px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,.3); }

  /* Desktop : 2 colonnes */
  .desktop-body { display: grid; grid-template-columns: 70% 30%; flex: 1; overflow: hidden; }
  .desktop-left { padding: 24px; border-right: 2px solid #E5E7EB; overflow-y: auto; }
  .desktop-chat { display: flex; flex-direction: column; background: #F9FAFB; overflow: hidden; }

  /* Mobile : caché par défaut */
  .mobile-tabs { display: none; }
  .mobile-body { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .tab-pane.active { display: block; }
  .chat-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .chat-pane.active { display: flex; }

  /* ===== MEDIA QUERY MOBILE ===== */
  @media (max-width: 768px) {
    body { padding: 0; }

    .list-cols { display: none; }
    .list-row { grid-template-columns: 1fr auto; padding: 14px 16px; }
    .list-row .hide-mobile { display: none; }

    .modal-overlay.open { align-items: stretch; justify-content: stretch; }
    .modal-box { width: 100%; height: 100%; border-radius: 0; box-shadow: none; }

    /* Cacher desktop, montrer mobile */
    .desktop-body { display: none; }
    .mobile-tabs { display: flex; border-bottom: 2px solid #E5E7EB; background: #fff; flex-shrink: 0; }
    .mobile-body { display: flex; }

    .mob-tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #9CA3AF; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .mob-tab.active { color: #122131; border-bottom-color: #122131; }

    .header-btn { height: 34px; padding: 0 12px; font-size: 12px; }
    .section-title { font-size: 10px; }
    table { font-size: 12px; }
    th { font-size: 10px; padding: 7px 8px; }
    td { padding: 7px 8px; }
  }
</style>
</head>
<body>

<div class="list-header">Commandes</div>
<div class="list-card">
  <div class="list-cols">
    <span>Plan</span><span>Créé le</span><span>Plans</span><span>Délai</span><span>Statut</span>
  </div>
  <div class="list-row" onclick="openModal()">
    <div>
      <div style="font-weight:700; font-size:13px; color:#111827;">RESIDENCE LES PINS — BAT A</div>
      <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">Simon REZE — CMD-001</div>
    </div>
    <div class="hide-mobile" style="font-size:12px; color:#6B7280;">23/03/2026</div>
    <div class="hide-mobile" style="font-size:13px; font-weight:600; color:#111827;">3</div>
    <div class="hide-mobile" style="font-size:12px; color:#6B7280;">28/03/2026</div>
    <span style="background:#FEF3C7; color:#78350F; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; border:1px solid #FDE68A; display:inline-block;">En attente</span>
  </div>
  <div class="list-row">
    <div>
      <div style="font-weight:700; font-size:13px; color:#111827;">EHPAD SAINT-JOSEPH</div>
      <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">Marie DUPONT — CMD-002</div>
    </div>
    <div class="hide-mobile" style="font-size:12px; color:#6B7280;">20/03/2026</div>
    <div class="hide-mobile" style="font-size:13px; font-weight:600; color:#111827;">5</div>
    <div class="hide-mobile" style="font-size:12px; color:#6B7280;">15/04/2026</div>
    <span style="background:#DBEAFE; color:#1E40AF; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; border:1px solid #BFDBFE; display:inline-block;">Commencé</span>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">

    <!-- Header commun -->
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:2px solid #E5E7EB; flex-shrink:0; background:#fff;">
      <div>
        <div style="font-size:15px; font-weight:700; color:#122131;">RESIDENCE LES PINS — BAT A</div>
        <div style="font-size:12px; color:#6B7280; margin-top:2px; font-weight:500;">Simon REZE — CMD-001</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="header-btn badge-attente">En attente</span>
        <div class="dropdown">
          <button class="header-btn" onclick="document.getElementById('ddMenu').classList.toggle('open'); event.stopPropagation();">•••</button>
          <div class="dropdown-menu" id="ddMenu">
            <button class="dropdown-item">📋 Dupliquer la commande</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger">🗃️ Archiver la commande</button>
          </div>
        </div>
        <button class="header-btn" onclick="closeModal()">✕</button>
      </div>
    </div>

    <!-- Onglets mobile -->
    <div class="mobile-tabs">
      <div class="mob-tab active" onclick="switchTab('infos',this)">📋 Infos</div>
      <div class="mob-tab" onclick="switchTab('chat',this)">💬 Chat <span style="background:#FC6C1B;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;">2</span></div>
    </div>

    <!-- Desktop : 2 colonnes -->
    <div class="desktop-body">
      <div class="desktop-left">
        <div id="shared-infos"><!-- contenu infos ci-dessous --></div>
      </div>
      <div class="desktop-chat">
        <div style="font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.8px;padding:14px;border-bottom:1px solid #E5E7EB;background:#fff;flex-shrink:0;">Messagerie</div>
        <div id="shared-messages" style="flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;"></div>
        <div style="padding:10px;border-top:2px solid #E5E7EB;background:#fff;flex-shrink:0;">
          <div style="display:flex;gap:6px;">
            <input placeholder="Votre message..." style="flex:1;font-size:12px;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;outline:none;" />
            <button style="background:#122131;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer;font-weight:600;">Envoyer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile : onglet Infos -->
    <div class="mobile-body">
      <div class="tab-pane active" id="mob-tab-infos"></div>
      <div class="chat-pane" id="mob-tab-chat">
        <div style="flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;background:#F9FAFB;" id="mob-messages"></div>
        <div style="padding:12px;border-top:2px solid #E5E7EB;background:#fff;flex-shrink:0;">
          <div style="display:flex;gap:8px;">
            <input placeholder="Votre message..." style="flex:1;font-size:14px;padding:11px 14px;border:1px solid #D1D5DB;border-radius:8px;outline:none;" />
            <button style="background:#122131;color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:16px;cursor:pointer;">↑</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // Contenu Infos (partagé desktop/mobile)
  var INFOS_HTML = `
    <div class="section-title">Informations</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;">
      <div style="background:#F3F4F6;border-radius:8px;padding:10px 12px;"><div style="font-size:10px;color:#6B7280;margin-bottom:4px;font-weight:600;text-transform:uppercase;">Créé le</div><div style="font-size:13px;font-weight:600;color:#111827;">23/03/2026</div></div>
      <div style="background:#FEF3C7;border-radius:8px;padding:10px 12px;border:1px solid #FDE68A;"><div style="font-size:10px;color:#78350F;margin-bottom:4px;font-weight:600;text-transform:uppercase;">Délai</div><div style="font-size:13px;font-weight:700;color:#78350F;">28/03/2026</div><div style="font-size:11px;color:#92400E;margin-top:2px;font-weight:600;">5 jours restants</div></div>
      <div style="background:#F3F4F6;border-radius:8px;padding:10px 12px;"><div style="font-size:10px;color:#6B7280;margin-bottom:4px;font-weight:600;text-transform:uppercase;">Nb. plans</div><div style="font-size:13px;font-weight:600;color:#111827;">3</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
      <div><div class="section-title">Adresse</div><div style="background:#F9FAFB;border:1px solid #D1D5DB;border-radius:8px;padding:10px 14px;font-size:13px;color:#111827;line-height:1.7;">12 Rue des Acacias<br/>Bât B — Entrée 2<br/>69001 Lyon</div></div>
      <div><div class="section-title">Contacts</div><div style="background:#F9FAFB;border:1px solid #D1D5DB;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:8px;"><div><div style="font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-bottom:2px;">Nom</div><div style="font-size:13px;font-weight:600;">Simon REZE</div></div><div><div style="font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-bottom:2px;">Email</div><a href="mailto:" style="font-size:13px;color:#2563EB;text-decoration:none;">simon@email.com</a></div><div><div style="font-size:10px;color:#6B7280;font-weight:600;text-transform:uppercase;margin-bottom:2px;">Téléphone</div><a href="tel:" style="font-size:13px;color:#2563EB;text-decoration:none;">06 12 34 56 78</a></div></div></div>
    </div>
    <div class="section-title" style="margin-bottom:10px;">Plans à réaliser</div>
    <div style="margin-bottom:24px;"><table><thead><tr><th style="width:36px;">N°</th><th>Type de plan</th><th>Orientation</th><th>Format</th></tr></thead><tbody><tr><td style="text-align:center;color:#9CA3AF;font-weight:600;">1</td><td>Plan d'évacuation</td><td>Paysage</td><td>A3</td></tr><tr><td style="text-align:center;color:#9CA3AF;font-weight:600;">2</td><td>Plan d'évacuation</td><td>Portrait</td><td>A4</td></tr><tr><td style="text-align:center;color:#9CA3AF;font-weight:600;">3</td><td>Plan de sécurité</td><td>Paysage</td><td>A3</td></tr></tbody></table></div>
    <div style="margin-bottom:12px;"><button class="accordion-btn" style="background:#F3F4F6;color:#374151;" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==='flex'?'none':'flex';this.querySelector('span:last-child').textContent=b.style.display==='flex'?'▼':'▶';"><span>📄 Fichiers du plan (2)</span><span>▶</span></button><div class="accordion-body" style="background:#fff;"><div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid #E5E7EB;border-radius:6px;"><span>📄</span><div style="flex:1;"><div style="font-size:12px;font-weight:600;">plan-rdc.pdf</div><div style="font-size:10px;color:#9CA3AF;">245 Ko</div></div><a style="font-size:11px;color:#2563EB;font-weight:500;">Ouvrir</a></div><div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid #E5E7EB;border-radius:6px;"><span>🖼️</span><div style="flex:1;"><div style="font-size:12px;font-weight:600;">facade.jpg</div><div style="font-size:10px;color:#9CA3AF;">1.2 Mo</div></div><a style="font-size:11px;color:#2563EB;font-weight:500;">Ouvrir</a></div></div></div>
    <div style="margin-bottom:12px;"><button class="accordion-btn" style="background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE;" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==='flex'?'none':'flex';this.querySelector('span:last-child').textContent=b.style.display==='flex'?'▼':'▶';"><span>📐 Plans partagés par le dessinateur (1)</span><span>▶</span></button><div class="accordion-body" style="background:#F0F9FF;border-color:#BFDBFE;"><div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid #BFDBFE;border-radius:6px;background:#fff;"><span>📐</span><div style="flex:1;"><div style="font-size:12px;font-weight:600;">ebauche-v1.pdf</div><div style="font-size:10px;color:#9CA3AF;">Version 1</div></div><a style="font-size:11px;color:#2563EB;font-weight:500;">Ouvrir</a></div></div></div>
  `;

  var MESSAGES_HTML = `
    <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 12px;"><div style="font-size:11px;font-weight:700;color:#1E40AF;">First Incendie</div><div style="font-size:12px;color:#374151;margin-top:4px;">Commande reçue, on revient vers vous rapidement.</div><div style="font-size:10px;color:#9CA3AF;margin-top:5px;">Hier 14:32</div></div>
    <div style="background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;"><div style="font-size:11px;font-weight:700;color:#374151;">Simon REZE</div><div style="font-size:12px;color:#374151;margin-top:4px;">Merci, j'attends votre retour.</div><div style="font-size:10px;color:#9CA3AF;margin-top:5px;">Hier 15:10</div></div>
    <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 12px;"><div style="font-size:11px;font-weight:700;color:#1E40AF;">First Incendie</div><div style="font-size:12px;color:#374151;margin-top:4px;">On commence la mission demain.</div><div style="font-size:10px;color:#9CA3AF;margin-top:5px;">Aujourd'hui 09:15</div></div>
  `;

  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('shared-infos').innerHTML = INFOS_HTML;
    document.getElementById('shared-messages').innerHTML = MESSAGES_HTML;
    document.getElementById('mob-tab-infos').innerHTML = INFOS_HTML;
    document.getElementById('mob-messages').innerHTML = MESSAGES_HTML;
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function switchTab(name, el) {
    document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('mob-tab-infos').classList.remove('active');
    document.getElementById('mob-tab-chat').classList.remove('active');
    if (name === 'infos') document.getElementById('mob-tab-infos').classList.add('active');
    else document.getElementById('mob-tab-chat').classList.add('active');
  }

  document.addEventListener('click', function() {
    document.getElementById('ddMenu').classList.remove('open');
  });
</script>
</body>
</html>
